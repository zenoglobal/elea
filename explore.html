<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elea — Stack Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1B3A;
    --navy-mid: #132040;
    --navy-light: #1E3060;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-pale: #F5E4A8;
    --white: #FFFFFF;
    --off-white: #F4F6FA;
    --muted: #8899BB;
    --border: rgba(201,168,76,0.18);
    --card-bg: rgba(19,32,64,0.85);
    --green: #2DD4A0;
    --orange: #F59E0B;
    --red: #EF4444;
    --blue: #60A5FA;
    --shadow: 0 8px 40px rgba(0,0,0,0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 100%, rgba(30,48,96,0.6) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,168,76,0.03) 80px),
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(201,168,76,0.03) 80px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11,27,58,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    border: 2px solid var(--gold);
    border-radius: 3px;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 18px;
    color: var(--gold); letter-spacing: -0.5px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 20px; letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--gold); }
  .logo-sub {
    font-size: 11px; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase; margin-top: 1px;
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }
  .header-pill {
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    font-size: 12px; color: var(--gold);
    font-weight: 500;
  }
  .header-btn {
    background: var(--gold);
    color: var(--navy);
    border: none; border-radius: 8px;
    padding: 8px 20px; font-size: 13px;
    font-weight: 700; cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: background 0.2s;
  }
  .header-btn:hover { background: var(--gold-light); }

  /* ── MAIN LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    height: calc(100vh - 64px);
  }

  /* ── LEFT SIDEBAR — CATEGORIES ── */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 16px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); padding: 0 8px 12px;
  }

  .cat-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 12px;
    border-radius: 8px; border: none;
    background: transparent; color: var(--white);
    cursor: pointer; text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px; font-weight: 400;
    transition: background 0.15s, color 0.15s;
    margin-bottom: 2px;
  }
  .cat-btn:hover { background: rgba(201,168,76,0.08); }
  .cat-btn.active {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    font-weight: 500;
  }
  .cat-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    background: rgba(255,255,255,0.06);
  }
  .cat-btn.active .cat-icon { background: rgba(201,168,76,0.2); }
  .cat-count {
    margin-left: auto;
    font-size: 11px; color: var(--muted);
    background: rgba(255,255,255,0.06);
    padding: 2px 7px; border-radius: 10px;
  }
  .cat-cost {
    font-size: 10.5px; font-weight: 700; color: var(--green);
    background: rgba(34,212,162,0.1);
    padding: 2px 7px; border-radius: 10px;
    margin-left: 4px; white-space: nowrap;
  }
  .cat-cost.has-cost { display: inline-block; }

  /* Stack summary footer in sidebar */
  .stack-summary {
    position: sticky; bottom: 0;
    background: rgba(11,27,58,0.98);
    border-top: 1px solid rgba(201,168,76,0.2);
    padding: 12px 14px;
    margin: 0 -16px -24px;
  }
  .ss-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .ss-label { font-size: 11px; color: var(--muted); font-weight: 500; }
  .ss-val { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; }
  .ss-total { font-size: 18px; color: var(--green); }
  .ss-sub { font-size: 10.5px; color: var(--muted); }

  /* Tier picker inside detail panel */
  .tier-picker { margin-top: 16px; }
  .tier-picker-label {
    font-size: 10.5px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; color: var(--gold); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .tier-picker-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .tier-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .tier-opt {
    padding: 9px 10px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    cursor: pointer; transition: all .15s; text-align: left;
  }
  .tier-opt:hover { border-color: var(--gold); background: rgba(201,168,76,0.07); }
  .tier-opt.selected { border-color: var(--green); background: rgba(34,212,162,0.08); }
  .tier-opt-name { font-size: 11px; font-weight: 700; color: var(--white); margin-bottom: 2px; }
  .tier-opt-price {
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800;
    color: var(--green);
  }
  .tier-opt-price.custom { color: var(--muted); font-size: 12px; }
  .tier-opt-note { font-size: 10px; color: var(--muted); margin-top: 1px; line-height: 1.3; }

  /* In-stack badge on tool card */
  .in-stack-badge {
    font-size: 10px; font-weight: 700;
    color: var(--green); background: rgba(34,212,162,0.1);
    border: 1px solid rgba(34,212,162,0.25);
    padding: 2px 7px; border-radius: 8px; flex-shrink: 0;
    white-space: nowrap;
  }

  /* ── MIDDLE — TOOL LIST ── */
  .tool-list-panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 20px;
  }
  .tool-list-panel::-webkit-scrollbar { width: 4px; }
  .tool-list-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
  }
  .panel-title span { color: var(--gold); }
  .search-box {
    position: relative; margin-bottom: 16px;
  }
  .search-box input {
    width: 100%; padding: 9px 12px 9px 36px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px; color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }

  .tool-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer; margin-bottom: 6px;
    background: rgba(255,255,255,0.03);
    transition: all 0.15s;
  }
  .tool-card:hover {
    background: rgba(201,168,76,0.07);
    border-color: rgba(201,168,76,0.2);
  }
  .tool-card.selected {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
  }
  .tool-card.in-stack {
    border-left: 3px solid rgba(34,212,162,0.5);
  }
  .tool-card.in-stack.selected {
    border-color: var(--gold);
    border-left-color: var(--green);
  }
  .tool-logo {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    font-weight: 700;
  }
  .tool-info { flex: 1; min-width: 0; }
  .tool-name {
    font-weight: 500; font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tool-tagline {
    font-size: 11.5px; color: var(--muted); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tool-badge {
    font-size: 10px; padding: 3px 7px; border-radius: 10px;
    font-weight: 600; flex-shrink: 0;
  }
  .badge-free { background: rgba(45,212,160,0.15); color: var(--green); }
  .badge-paid { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge-freemium { background: rgba(245,158,11,0.15); color: var(--orange); }
  .badge-open { background: rgba(255,255,255,0.1); color: var(--muted); }

  /* ── RIGHT — TOOL DETAIL ── */
  .detail-panel {
    overflow-y: auto;
    padding: 28px 24px;
    background: rgba(11,27,58,0.4);
  }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; opacity: 0.3; text-align: center;
    gap: 12px;
  }
  .detail-empty-icon { font-size: 48px; }
  .detail-empty p { font-size: 14px; color: var(--muted); }

  .detail-logo {
    width: 64px; height: 64px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; margin-bottom: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    font-weight: 700;
  }
  .detail-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800; margin-bottom: 4px;
  }
  .detail-tagline {
    color: var(--muted); font-size: 13.5px; margin-bottom: 16px;
    line-height: 1.5;
  }
  .detail-tags {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
  }
  .detail-tag {
    font-size: 11px; padding: 4px 10px; border-radius: 10px;
    border: 1px solid var(--border); color: var(--muted);
    font-weight: 500;
  }
  .detail-tag.highlight {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.1);
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px; margin-top: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* Pricing tiers */
  .pricing-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 4px;
  }
  .price-tier {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px;
  }
  .price-tier.free-tier { border-color: rgba(45,212,160,0.3); }
  .price-tier-name {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); margin-bottom: 3px;
  }
  .price-tier.free-tier .price-tier-name { color: var(--green); }
  .price-amount {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--white);
  }
  .price-note { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Features */
  .feature-list { list-style: none; }
  .feature-list li {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 13px; padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: #CBD5E8;
    line-height: 1.45;
  }
  .feature-list li:last-child { border-bottom: none; }
  .feature-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); margin-top: 5px; flex-shrink: 0;
  }

  /* Usage rights */
  .usage-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12.5px;
  }
  .usage-row:last-child { border-bottom: none; }
  .usage-key { color: var(--muted); }
  .usage-val { font-weight: 500; text-align: right; max-width: 60%; }
  .usage-val.good { color: var(--green); }
  .usage-val.warn { color: var(--orange); }
  .usage-val.bad { color: var(--red); }

  /* Integrations */
  .int-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .int-chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 4px 10px;
    font-size: 11.5px; color: var(--muted);
  }

  /* Elea status */
  .elea-status {
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    display: flex; align-items: center; gap: 12px;
    margin-top: 4px;
  }
  .status-icon { font-size: 22px; }
  .status-text { flex: 1; }
  .status-label {
    font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 2px;
  }
  .status-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* Add to stack btn */
  .add-btn {
    width: 100%; margin-top: 20px; padding: 12px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--navy); cursor: pointer; transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.9; }
  .compare-btn {
    width: 100%; margin-top: 8px; padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .compare-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tool-card { animation: fadeIn 0.2s ease both; }
  .detail-content { animation: fadeIn 0.25s ease both; }

  /* Scrollbar global */
  * { scrollbar-width: thin; scrollbar-color: rgba(201,168,76,0.2) transparent; }

  /* Status bar at bottom */
  .status-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(11,27,58,0.95);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(12px);
    padding: 6px 32px;
    display: flex; align-items: center; gap: 24px;
    font-size: 11.5px; color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    box-shadow: 0 0 6px var(--green);
  }
  .status-item { display: flex; align-items: center; gap: 6px; }
  .status-num { color: var(--gold); font-weight: 600; }

  /* Responsive note */
  @media (max-width: 900px) {
    .app { grid-template-columns: 220px 1fr; }
    .detail-panel { display: none; }
  }

  .layer-btn {
    padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
    border: 1.5px solid rgba(255,255,255,0.1); background: transparent;
    color: var(--muted); cursor: pointer; transition: all .15s;
    font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .layer-btn:hover { border-color: var(--gold); color: var(--gold); }
  .layer-btn.active { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold); }

  .sidebar-layer-hdr {
    font-size: 9.5px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.2px; color: rgba(201,168,76,0.5);
    padding: 14px 8px 4px; margin-top: 4px;
  }

  header { gap: 16px; }

  .nav-unified{display:flex;gap:2px;}
  .nav-unified-tab{padding:6px 16px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--muted,#7A90B8);background:transparent;border:none;cursor:pointer;transition:all .15s;font-family:inherit;}
  .nav-unified-tab:hover{color:#fff;background:rgba(255,255,255,.05);}
  .nav-unified-tab.active{color:#C9A84C;background:rgba(201,168,76,.1);}

</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="./index.html" style="text-decoration:none;color:inherit;">
    <div class="logo-mark">Z</div>
    <div>
      <div class="logo-text"><span>Elea</span></div>
      <div class="logo-sub">Stack Intelligence · Zeno Global</div>
    </div>
  </a>
  <div class="nav-unified" style="flex:1;justify-content:center;">
    <button class="nav-unified-tab" onclick="location.href='./index.html'">Home</button>
    <button class="nav-unified-tab active" onclick="location.href='./explore.html'">Explore</button>
    <button class="nav-unified-tab" onclick="location.href='./builder.html'">Builder</button>
    <button class="nav-unified-tab" onclick="location.href='./my_stack.html'">My Stack</button>
  </div>
  <div class="header-right">
    <div class="header-pill" id="selected-count-pill">0 tools selected</div>
    <button class="header-btn" style="background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--muted);margin-right:4px;" onclick="clearStack()">✕ Clear</button>
    <button class="header-btn" onclick="runAudit()">▶ Run Audit</button>
  </div>
</header>

<!-- LAYER FILTER BAR -->
<div id="layer-bar" style="position:relative;z-index:2;background:rgba(11,27,58,0.85);border-bottom:1px solid rgba(201,168,76,0.12);padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;backdrop-filter:blur(8px);">
  <span style="font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#7A90B8;margin-right:4px;white-space:nowrap;">Stack Layer:</span>
  <button class="layer-btn active" onclick="setLayer('all',this)">◈ All Layers</button>
  <button class="layer-btn" onclick="setLayer('frontend',this)">🖥 Frontend</button>
  <button class="layer-btn" onclick="setLayer('backend',this)">⚙️ Backend</button>
  <button class="layer-btn" onclick="setLayer('intelligence',this)">🤖 Intelligence</button>
  <button class="layer-btn" onclick="setLayer('operations',this)">🔁 Operations</button>
  <button class="layer-btn" onclick="setLayer('security',this)" style="border-color:rgba(240,82,82,0.3);color:#F05252;">🔐 Security & Governance</button>
  <button class="layer-btn" onclick="setLayer('business',this)">💳 Business</button>
  <div id="layer-desc" style="margin-left:auto;font-size:11.5px;color:#7A90B8;max-width:360px;text-align:right;"></div>
</div>

<!-- MAIN APP -->
<div class="app">

  <!-- LEFT: CATEGORIES -->
  <div class="sidebar">
    <div class="sidebar-title">Categories</div>
    <div id="category-list"></div>
    <div class="stack-summary" id="stack-summary" style="display:none;"></div>
  </div>

  <!-- MIDDLE: TOOL LIST -->
  <div class="tool-list-panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title">All Tools</div>
    </div>
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search tools, features, integrations..." oninput="filterTools()">
    </div>

// ── Price parsing helpers ──────────────────────────────
function parseMonthly(amount) {
  if (!amount) return null;
  const s = amount.toString().trim();
  if (/^\$0$|^free$|^open source$/i.test(s)) return 0;
  if (/^custom$|^variable$|^usage$|^contact$|^included$/i.test(s)) return null;
  // e.g. "$20/mo" or "$9.99/mo"
  const mo = s.match(/\$(\d[\d,]*(?:\.\d+)?)\s*\/\s*mo/i);
  if (mo) return parseFloat(mo[1].replace(',', ''));
  // e.g. "$99/yr" or "$119.99/yr"  → monthly
  const yr = s.match(/\$(\d[\d,]*(?:\.\d+)?)\s*\/\s*yr/i);
  if (yr) return parseFloat(yr[1].replace(',', '')) / 12;
  // e.g. "$35K/yr"
  const kyr = s.match(/\$(\d+(?:\.\d+)?)[Kk]\s*\/\s*yr/i);
  if (kyr) return parseFloat(kyr[1]) * 1000 / 12;
  // plain "$5" (per month assumed)
  const plain = s.match(/^\$(\d[\d,]*(?:\.\d+)?)$/);
  if (plain) return parseFloat(plain[1].replace(',', ''));
  return null;
}

function fmtPrice(n) {
  if (n === null || n === undefined) return 'Custom';
  if (n === 0) return '$0';
  if (n < 10) return '$' + n.toFixed(2).replace(/\.00$/, '') + '/mo';
  return '$' + Math.round(n).toLocaleString() + '/mo';
}

function getStackTotal() {
  let t = 0; let hasCustom = false;
  myStack.forEach(v => { v.monthlyPrice !== null ? t += v.monthlyPrice : hasCustom = true; });
  return { total: t, hasCustom };
}

function getCatTotal(catId) {
  let t = 0; let count = 0; let hasCustom = false;
  myStack.forEach((v, id) => {
    const tool = tools.find(tt => tt.id === id);
    if (tool && tool.cat === catId) {
      count++;
      v.monthlyPrice !== null ? t += v.monthlyPrice : hasCustom = true;
    }
  });
  return { total: t, count, hasCustom };
}

function addToStack(toolId, tierIndex) {
  const tool = tools.find(t => t.id === toolId);
  if (!tool) return;
  const tier = tool.pricing[tierIndex];
  if (!tier) return;
  const price = parseMonthly(tier.amount);

  // Store in stack
  myStack.set(toolId, { tierIndex, tierName: tier.name, amount: tier.amount, monthlyPrice: price });
  selectedToolIds = new Set([...myStack.keys()]);

  // Re-render everything in the correct order
  renderCategories();   // sidebar cost badges update
  renderTools();        // list badges update
  updateStackUI();      // header pill + status bar + summary + save
  renderDetail();       // detail panel shows "in stack" state

  const priceStr = price === null ? '(custom pricing)' : price === 0 ? 'Free' : fmtPrice(price);
  showExploreToast(`✓ ${tool.name} <span style="opacity:.7">·</span> ${tier.name} — ${priceStr}`, '#22D4A2');
}

function removeFromStack(toolId) {
  const tool = tools.find(t => t.id === toolId);
  myStack.delete(toolId);
  selectedToolIds = new Set([...myStack.keys()]);
  renderCategories();   // sidebar updates first
  renderTools();
  updateStackUI();
  renderDetail();
  showExploreToast(`${tool?.name || 'Tool'} removed from stack`, '#F05252');
}

function saveStack() {
  try {
    const data = [];
    myStack.forEach((v, id) => {
      const tool = tools.find(t => t.id === id);
      if (!tool) return;
      const cm = catMeta[tool.cat] || { name: tool.cat, icon: '◈', color: '#C9A84C' };
      data.push({
        id, name: tool.name, emoji: tool.emoji,
        cat: tool.cat, catName: cm.name, catIcon: cm.icon, catColor: cm.color,
        badge: tool.badge, tagline: tool.tagline,
        tierName: v.tierName, amount: v.amount, monthlyPrice: v.monthlyPrice,
      });
    });
    localStorage.setItem('elea_stack', JSON.stringify(data));
  } catch(e) { console.warn('Stack save failed:', e); }
}

function loadStack() {
  try {
    const raw = localStorage.getItem('elea_stack');
    if (!raw) return;
    const data = JSON.parse(raw);
    data.forEach(item => {
      myStack.set(item.id, {
        tierIndex: 0, tierName: item.tierName,
        amount: item.amount, monthlyPrice: item.monthlyPrice,
      });
    });
    selectedToolIds = new Set([...myStack.keys()]);
    // Refresh everything — must happen AFTER myStack is populated
    renderCategories();
    renderTools();
    updateStackUI();
  } catch(e) { console.warn('Stack load failed:', e); }
}

function clearStack() {
  if (myStack.size === 0) return;
  if (!confirm(`Remove all ${myStack.size} tools from your stack?`)) return;
  myStack.clear();
  selectedToolIds = new Set();
  localStorage.removeItem('elea_stack');
  renderCategories();
  renderTools();
  updateStackUI();
  if (selectedTool) renderDetail();
  showExploreToast('Stack cleared', '#7A90B8');
}

function updateStackUI() {
  const { total, hasCustom } = getStackTotal();
  const count = myStack.size;
  const totalStr = count === 0 ? '0 tools' : `${count} tool${count !== 1 ? 's' : ''} · ${fmtPrice(total)}${hasCustom ? '+' : ''}`;

  // Header pill
  const pill = document.getElementById('selected-count-pill');
  if (pill) pill.textContent = totalStr;

  // Status bar
  const sb = document.getElementById('sb-stack-total');
  if (sb) sb.textContent = count === 0 ? '—' : fmtPrice(total) + (hasCustom ? '+' : '');

  // Sidebar summary footer
  renderStackSummary();

  // Persist to localStorage
  saveStack();
}

function renderStackSummary() {
  const el = document.getElementById('stack-summary');
  if (!el) return;
  if (myStack.size === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  const { total, hasCustom } = getStackTotal();
  const annualStr = hasCustom
    ? '$' + Math.round(total * 12).toLocaleString() + '+/yr'
    : '$' + Math.round(total * 12).toLocaleString() + '/yr';
  el.innerHTML = `
    <div class="ss-row">
      <span class="ss-label">Stack Total</span>
      <span class="ss-val ss-total">${fmtPrice(total)}${hasCustom ? '+' : ''}</span>
    </div>

      <span class="ss-sub">${myStack.size} tool${myStack.size !== 1 ? 's' : ''} selected · ${annualStr}</span>
      <a href="./my_stack.html" style="font-size:10.5px;color:var(--gold);font-weight:700;text-decoration:none;">View Stack →</a>

}

function renderCategories() {
  const el = document.getElementById('category-list');
  const layerLabels = {
    frontend:'🖥 Frontend', backend:'⚙️ Backend', intelligence:'🤖 Intelligence',
    operations:'🔁 Operations', security:'🔐 Security & Governance', business:'💳 Business'
  };

  let html = '';
  let lastLayer = null;

  const visible = activeLayer === 'all'
    ? categories
    : categories.filter(c => c.id === 'all' || c.layer === activeLayer || c.layer === 'all');

  visible.forEach(c => {
    const count = c.id === 'all'
      ? getLayerTools().length
      : getLayerTools().filter(t => t.cat === c.id).length;
    if (count === 0 && c.id !== 'all') return;
    if (c.layer !== 'all' && c.layer !== lastLayer && activeLayer === 'all') {
      html += `<div class="sidebar-layer-hdr">${layerLabels[c.layer] || ''}</div>`;
      lastLayer = c.layer;
    }

    let costBadge = '';
    if (c.id !== 'all') {
      const { total, count: stackCount, hasCustom } = getCatTotal(c.id);
      if (stackCount > 0) {
        const label = hasCustom && total === 0 ? 'Custom'
                    : total === 0 ? 'Free'
                    : fmtPrice(total) + (hasCustom ? '+' : '');
        const badgeColor = total === 0 && !hasCustom ? 'rgba(34,212,162,0.15);color:var(--green)' : 'rgba(34,212,162,0.12);color:var(--green)';
        costBadge = `<span class="cat-cost" style="background:${badgeColor}">${label}</span>`;
      }
    } else if (myStack.size > 0) {
      const { total, hasCustom } = getStackTotal();
      const label = total === 0 ? 'Free tier' : fmtPrice(total) + (hasCustom ? '+' : '');
      costBadge = `<span class="cat-cost">${label}</span>`;
    }

    const stackCount = c.id === 'all' ? myStack.size : getCatTotal(c.id).count;
    const countLabel = stackCount > 0
      ? `<span class="cat-count" style="background:rgba(34,212,162,0.15);color:var(--green);">✓ ${stackCount}</span>`
      : `<span class="cat-count">${count}</span>`;

    html += `<button class="cat-btn ${c.id === activeCat ? 'active' : ''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      ${c.name}
      ${costBadge}
      ${countLabel}
    </button>`;
  });
  el.innerHTML = html;

  // ensure summary is rendered after categories
  renderStackSummary();
}

function getLayerTools() {
  if (activeLayer === 'all') return tools;
  const layerCats = categories.filter(c => c.layer === activeLayer).map(c => c.id);
  return tools.filter(t => layerCats.includes(t.cat));
}

function setLayer(layer, btn) {
  activeLayer = layer;
  document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const meta = layerMeta[layer] || {};
  document.getElementById('layer-desc').textContent = meta.desc || '';
  // Reset category to 'all' when switching layers
  activeCat = 'all';
  searchQuery = '';
  document.getElementById('search-input').value = '';
  renderCategories();
  renderTools();
  document.getElementById('panel-title').innerHTML = 'All Tools';
}

  let list = getLayerTools();
  if (activeCat !== 'all') list = list.filter(t => t.cat === activeCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.tagline.toLowerCase().includes(q) ||
      t.tags.some(tag => tag.toLowerCase().includes(q)) ||
      t.features.some(f => f.toLowerCase().includes(q)) ||
      t.integrations.some(i => i.toLowerCase().includes(q))

  return list;
}

      : `<span class="tool-badge badge-${t.badge}">${t.badge}</span>`;
    return `
    <div class="tool-card ${selectedTool?.id === t.id ? 'selected' : ''} ${stackEntry ? 'in-stack' : ''}"

        <div class="tool-tagline">${t.tagline}</div>

function compareSimilar(id) {
  const tool = tools.find(t => t.id === id);
  if (!tool) return;
  const similar = tools.filter(t => t.cat === tool.cat && t.id !== id);
  if (similar.length === 0) {
    showExploreToast('No other tools in this category to compare.', '#7A90B8');
    return;
  }
  // Show comparison overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;z-index:500;background:rgba(11,27,58,0.92);
    display:flex;align-items:center;justify-content:center;padding:32px;`;
  const box = document.createElement('div');
  box.style.cssText = `background:#132040;border:1px solid rgba(201,168,76,.25);border-radius:16px;
    padding:28px;max-width:960px;width:100%;max-height:80vh;overflow-y:auto;position:relative;`;
  const closables = [overlay, box];

  const compareTools = [tool, ...similar].slice(0, 4);
  const rows = ['badge','pricing[0].amount','features[0]','usage[0].v','integrations[0]'];

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#C9A84C;">⇄ Comparing ${tool.name} vs Similar</div>
    <button onclick="this.closest('[style*=fixed]').remove()" style="background:transparent;border:1px solid rgba(255,255,255,.15);color:#7A90B8;border-radius:7px;padding:5px 14px;cursor:pointer;font-size:13px;">✕ Close</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(${compareTools.length},1fr);gap:12px;">`;
  compareTools.forEach(t => {
    html += `<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;${t.id===id?'border-color:#C9A84C;':''}">
      <div style="font-size:22px;margin-bottom:6px;">${t.emoji}</div>
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:3px;">${t.name}</div>
      <div style="font-size:11px;color:#7A90B8;margin-bottom:10px;">${t.tagline}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#C9A84C;margin-bottom:6px;font-weight:700;">Starting Price</div>
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:10px;">${t.pricing[0].amount}<span style="font-size:11px;color:#7A90B8;font-family:inherit"> ${t.pricing[0].note}</span></div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#C9A84C;margin-bottom:6px;font-weight:700;">Top Features</div>
      ${t.features.slice(0,3).map(f=>`<div style="font-size:11.5px;color:#CBD5E8;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);">▸ ${f.split(':')[0]}</div>`).join('')}
      <button onclick="selectTool('${t.id}');this.closest('[style*=fixed]').remove();" style="width:100%;margin-top:12px;padding:8px;border-radius:7px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:#C9A84C;font-family:'Syne',sans-serif;font-weight:700;font-size:11.5px;cursor:pointer;">View Full Details →</button>
    </div>`;
  });
  html += '</div>';
  box.innerHTML = html;
  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function runAudit() {
  if (selectedToolIds.size === 0) {
    showExploreToast('Select at least one tool first to run an audit.', '#F4A732');
    return;
  }
  const names = [...selectedToolIds].map(id => tools.find(t=>t.id===id)?.name).filter(Boolean).join(', ');
  showExploreToast(`🔍 Audit running for: ${names}`, '#C9A84C');
  setTimeout(() => showExploreToast('Audit complete — view results in My Stack', '#22D4A2'), 2000);
}

init();

// Handle deep-link from Builder/index: explore.html#cat=cloud
(function(){
  const hash = window.location.hash.replace('#','');
  if(hash.startsWith('cat=')){
    const catId = hash.split('=')[1];
    const cat = categories.find(c => c.id === catId);
    if(cat){
      // Auto-activate the matching layer filter
      if(cat.layer && cat.layer !== 'all'){
        activeLayer = cat.layer;
        const layerBtn = document.querySelector(`.layer-btn[onclick*="'${cat.layer}'"]`);
        if(layerBtn){
          document.querySelectorAll('.layer-btn').forEach(b=>b.classList.remove('active'));
          layerBtn.classList.add('active');
          const meta = layerMeta[cat.layer]||{};
          const ld = document.getElementById('layer-desc');
          if(ld) ld.textContent = meta.desc||'';
        }
      }
      selectCat(catId);
    }
  }
})();
</script>
