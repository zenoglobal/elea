<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elea — Explore Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1B3A;
    --navy-mid: #132040;
    --navy-light: #1E3060;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-pale: #F5E4A8;
    --white: #FFFFFF;
    --off-white: #F4F6FA;
    --muted: #8899BB;
    --border: rgba(201,168,76,0.18);
    --card-bg: rgba(19,32,64,0.85);
    --green: #2DD4A0;
    --orange: #F59E0B;
    --red: #EF4444;
    --blue: #60A5FA;
    --shadow: 0 8px 40px rgba(0,0,0,0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 100%, rgba(30,48,96,0.6) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,168,76,0.03) 80px),
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(201,168,76,0.03) 80px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11,27,58,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 16px; color: var(--navy);
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 20px; letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--gold); }
  .logo-sub {
    font-size: 11px; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase; margin-top: 1px;
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }
  .header-pill {
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    font-size: 12px; color: var(--gold);
    font-weight: 500;
  }
  .header-btn {
    background: var(--gold);
    color: var(--navy);
    border: none; border-radius: 8px;
    padding: 8px 20px; font-size: 13px;
    font-weight: 700; cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: background 0.2s;
  }
  .header-btn:hover { background: var(--gold-light); }

  /* ── MAIN LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    height: calc(100vh - 64px);
  }

  /* ── LEFT SIDEBAR — CATEGORIES ── */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 16px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); padding: 0 8px 12px;
  }

  .cat-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 12px;
    border-radius: 8px; border: none;
    background: transparent; color: var(--white);
    cursor: pointer; text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px; font-weight: 400;
    transition: background 0.15s, color 0.15s;
    margin-bottom: 2px;
  }
  .cat-btn:hover { background: rgba(201,168,76,0.08); }
  .cat-btn.active {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    font-weight: 500;
  }
  .cat-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    background: rgba(255,255,255,0.06);
  }
  .cat-btn.active .cat-icon { background: rgba(201,168,76,0.2); }
  .cat-count {
    margin-left: auto;
    font-size: 11px; color: var(--muted);
    background: rgba(255,255,255,0.06);
    padding: 2px 7px; border-radius: 10px;
  }

  /* ── MIDDLE — TOOL LIST ── */
  .tool-list-panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 20px;
  }
  .tool-list-panel::-webkit-scrollbar { width: 4px; }
  .tool-list-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
  }
  .panel-title span { color: var(--gold); }
  .search-box {
    position: relative; margin-bottom: 16px;
  }
  .search-box input {
    width: 100%; padding: 9px 12px 9px 36px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px; color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }

  .tool-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer; margin-bottom: 6px;
    background: rgba(255,255,255,0.03);
    transition: all 0.15s;
  }
  .tool-card:hover {
    background: rgba(201,168,76,0.07);
    border-color: rgba(201,168,76,0.2);
  }
  .tool-card.selected {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
  }
  .tool-logo {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    font-weight: 700;
  }
  .tool-info { flex: 1; min-width: 0; }
  .tool-name {
    font-weight: 500; font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tool-tagline {
    font-size: 11.5px; color: var(--muted); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tool-badge {
    font-size: 10px; padding: 3px 7px; border-radius: 10px;
    font-weight: 600; flex-shrink: 0;
  }
  .badge-free { background: rgba(45,212,160,0.15); color: var(--green); }
  .badge-paid { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge-freemium { background: rgba(245,158,11,0.15); color: var(--orange); }
  .badge-open { background: rgba(255,255,255,0.1); color: var(--muted); }

  /* ── RIGHT — TOOL DETAIL ── */
  .detail-panel {
    overflow-y: auto;
    padding: 28px 24px;
    background: rgba(11,27,58,0.4);
  }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; opacity: 0.3; text-align: center;
    gap: 12px;
  }
  .detail-empty-icon { font-size: 48px; }
  .detail-empty p { font-size: 14px; color: var(--muted); }

  .detail-logo {
    width: 64px; height: 64px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; margin-bottom: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    font-weight: 700;
  }
  .detail-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800; margin-bottom: 4px;
  }
  .detail-tagline {
    color: var(--muted); font-size: 13.5px; margin-bottom: 16px;
    line-height: 1.5;
  }
  .detail-tags {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
  }
  .detail-tag {
    font-size: 11px; padding: 4px 10px; border-radius: 10px;
    border: 1px solid var(--border); color: var(--muted);
    font-weight: 500;
  }
  .detail-tag.highlight {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.1);
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px; margin-top: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* Pricing tiers */
  .pricing-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 4px;
  }
  .price-tier {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px;
  }
  .price-tier.free-tier { border-color: rgba(45,212,160,0.3); }
  .price-tier-name {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); margin-bottom: 3px;
  }
  .price-tier.free-tier .price-tier-name { color: var(--green); }
  .price-amount {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--white);
  }
  .price-note { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Features */
  .feature-list { list-style: none; }
  .feature-list li {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 13px; padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: #CBD5E8;
    line-height: 1.45;
  }
  .feature-list li:last-child { border-bottom: none; }
  .feature-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); margin-top: 5px; flex-shrink: 0;
  }

  /* Usage rights */
  .usage-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12.5px;
  }
  .usage-row:last-child { border-bottom: none; }
  .usage-key { color: var(--muted); }
  .usage-val { font-weight: 500; text-align: right; max-width: 60%; }
  .usage-val.good { color: var(--green); }
  .usage-val.warn { color: var(--orange); }
  .usage-val.bad { color: var(--red); }

  /* Integrations */
  .int-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .int-chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 4px 10px;
    font-size: 11.5px; color: var(--muted);
  }

  /* Elea status */
  .elea-status {
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    display: flex; align-items: center; gap: 12px;
    margin-top: 4px;
  }
  .status-icon { font-size: 22px; }
  .status-text { flex: 1; }
  .status-label {
    font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 2px;
  }
  .status-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* Add to stack btn */
  .add-btn {
    width: 100%; margin-top: 20px; padding: 12px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--navy); cursor: pointer; transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.9; }
  .compare-btn {
    width: 100%; margin-top: 8px; padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .compare-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tool-card { animation: fadeIn 0.2s ease both; }
  .detail-content { animation: fadeIn 0.25s ease both; }

  /* Scrollbar global */
  * { scrollbar-width: thin; scrollbar-color: rgba(201,168,76,0.2) transparent; }

  /* Status bar at bottom */
  .status-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(11,27,58,0.95);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(12px);
    padding: 6px 32px;
    display: flex; align-items: center; gap: 24px;
    font-size: 11.5px; color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    box-shadow: 0 0 6px var(--green);
  }
  .status-item { display: flex; align-items: center; gap: 6px; }
  .status-num { color: var(--gold); font-weight: 600; }

  /* Responsive note */
  @media (max-width: 900px) {
    .app { grid-template-columns: 220px 1fr; }
    .detail-panel { display: none; }
  }

  header { gap: 16px; }

  .nav-unified{display:flex;gap:2px;}
  .nav-unified-tab{padding:6px 16px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--muted,#7A90B8);background:transparent;border:none;cursor:pointer;transition:all .15s;font-family:inherit;}
  .nav-unified-tab:hover{color:#fff;background:rgba(255,255,255,.05);}
  .nav-unified-tab.active{color:#C9A84C;background:rgba(201,168,76,.1);}

</style>
</head>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let activeCat = 'all';
let selectedTool = null;
let selectedToolIds = new Set();
let searchQuery = '';

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  renderCategories();
  renderTools();
  document.getElementById('total-count').textContent = tools.length;
  document.getElementById('free-count').textContent =
    tools.filter(t => t.badge === 'free' || t.badge === 'freemium' || t.badge === 'open').length;
}

// ─────────────────────────────────────────────
// CATEGORIES
// ─────────────────────────────────────────────
function renderCategories() {
  const el = document.getElementById('category-list');
  el.innerHTML = categories.map(c => {
    const count = c.id === 'all' ? tools.length : tools.filter(t => t.cat === c.id).length;
    return `<button class="cat-btn ${c.id === activeCat ? 'active' : ''}"
      onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      ${c.name}
      <span class="cat-count">${count}</span>
    </button>`;
  }).join('');
}

function selectCat(id) {
  activeCat = id;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  renderCategories();
  renderTools();
  const cat = categories.find(c => c.id === id);
  document.getElementById('panel-title').innerHTML = id === 'all'
    ? 'All Tools'
    : `<span>${cat.icon}</span> ${cat.name}`;
}

// ─────────────────────────────────────────────
// TOOLS LIST
// ─────────────────────────────────────────────
function getFilteredTools() {
  let list = activeCat === 'all' ? tools : tools.filter(t => t.cat === activeCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.tagline.toLowerCase().includes(q) ||
      t.tags.some(tag => tag.toLowerCase().includes(q)) ||
      t.features.some(f => f.toLowerCase().includes(q)) ||
      t.integrations.some(i => i.toLowerCase().includes(q))
    );
  }
  return list;
}

function renderTools() {
  const list = getFilteredTools();
  const el = document.getElementById('tool-list');
  if (list.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;">No tools found for "${searchQuery}"</div>`;
    return;
  }
  el.innerHTML = list.map((t, i) => `
    <div class="tool-card ${selectedTool?.id === t.id ? 'selected' : ''}"
      onclick="selectTool('${t.id}')"
      style="animation-delay:${i * 0.03}s">
      <div class="tool-logo">${t.emoji}</div>
      <div class="tool-info">
        <div class="tool-name">${t.name}</div>
        <div class="tool-tagline">${t.tagline}</div>
      </div>
      <span class="tool-badge badge-${t.badge}">${t.badge}</span>
    </div>
  `).join('');
}

function filterTools() {
  searchQuery = document.getElementById('search-input').value;
  renderTools();
}

// ─────────────────────────────────────────────
// TOOL DETAIL
// ─────────────────────────────────────────────
function selectTool(id) {
  selectedTool = tools.find(t => t.id === id);
  renderTools();
  renderDetail();
}

function renderDetail() {
  const t = selectedTool;
  if (!t) return;
  const panel = document.getElementById('detail-panel');

  const statusColor = t.statusType === 'good' ? 'var(--green)' : t.statusType === 'warn' ? 'var(--orange)' : 'var(--muted)';

  panel.innerHTML = `<div class="detail-content">
    <div class="detail-logo">${t.emoji}</div>
    <div class="detail-name">${t.name}</div>
    <div class="detail-tagline">${t.tagline}</div>
    <div class="detail-tags">
      <span class="detail-tag badge-${t.badge}" style="background:transparent">${t.badge.toUpperCase()}</span>
      ${t.tags.map(tag => `<span class="detail-tag">${tag}</span>`).join('')}
    </div>

    <div class="section-label">Pricing Tiers</div>
    <div class="pricing-grid">
      ${t.pricing.map(p => `
        <div class="price-tier ${p.name.toLowerCase().includes('free') || p.name.toLowerCase().includes('community') || p.name.toLowerCase().includes('hobby') || p.name.toLowerCase().includes('starter') && p.amount === '$0' ? 'free-tier' : ''}">
          <div class="price-tier-name">${p.name}</div>
          <div class="price-amount">${p.amount}</div>
          <div class="price-note">${p.note}</div>
        </div>
      `).join('')}
    </div>

    <div class="section-label">Key Features</div>
    <ul class="feature-list">
      ${t.features.map(f => `<li><span class="feature-dot"></span>${f}</li>`).join('')}
    </ul>

    <div class="section-label">Usage Rights & Limits</div>
    ${t.usage.map(u => `
      <div class="usage-row">
        <span class="usage-key">${u.k}</span>
        <span class="usage-val ${u.s}">${u.v}</span>
      </div>
    `).join('')}

    <div class="section-label">Integrations</div>
    <div class="int-grid">
      ${t.integrations.map(i => `<span class="int-chip">${i}</span>`).join('')}
    </div>

    <div class="section-label">Best For</div>
    <p style="font-size:13px;color:#CBD5E8;line-height:1.6">${t.bestFor}</p>

    <div class="section-label">Elea Insight</div>
    <div class="elea-status">
      <div class="status-icon">◈</div>
      <div class="status-text">
        <div class="status-label" style="color:${statusColor}">ELEA ANALYSIS</div>
        <div class="status-desc">${t.eleaStatus}</div>
      </div>
    </div>

    <button class="add-btn" onclick="toggleSelect('${t.id}')">
      ${selectedToolIds.has(t.id) ? '✓ Added to Stack' : '+ Add to My Stack'}
    </button>
    <button class="compare-btn">⇄ Compare with Similar</button>
  </div>`;
}

function toggleSelect(id) {
  if (selectedToolIds.has(id)) {
    selectedToolIds.delete(id);
  } else {
    selectedToolIds.add(id);
  }
  document.getElementById('selected-count-pill').textContent = `${selectedToolIds.size} tool${selectedToolIds.size !== 1 ? 's' : ''} selected`;
  renderDetail();
}

function runAudit() {
  if (selectedToolIds.size === 0) {
    alert('Select at least one tool from your stack to run an audit.');
    return;
  }
  alert(`🔍 Elea Audit initiated for ${selectedToolIds.size} tool(s).\n\nIn the full platform, this generates your cost optimization report with savings opportunities, redundancy flags, and ROI analysis.\n\n📄 See the sample audit report (DOCX) for what this looks like.`);
}

init();
</script>
